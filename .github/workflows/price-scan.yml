name: Trigger price scan

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Queue the hourly price scan
        env:
          API_URL: ${{ secrets.CARTPARTY_API_URL }}
          PRICE_SCAN_SECRET: ${{ secrets.CARTPARTY_PRICE_SCAN_SECRET }}
        run: |
          curl --fail --retry 3 --retry-delay 20 --retry-connrefused \
            --request POST "$API_URL/internal/price-scan" \
            --header "x-cartparty-price-secret: $PRICE_SCAN_SECRET"
