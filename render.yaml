services:
  - type: web
    name: cartparty-api
    runtime: node
    region: ohio
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @cartparty/api prisma:generate && pnpm --filter @cartparty/api build
    startCommand: pnpm --filter @cartparty/api prisma:deploy && pnpm --filter @cartparty/api start:prod
    healthCheckPath: /health
    envVars:
      - fromGroup: cartparty-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: cartparty-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cartparty-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: RUN_PRICE_SCHEDULER
        value: "false"
      - key: PRICE_SCAN_SECRET
        sync: false

  - type: keyvalue
    name: cartparty-redis
    region: ohio
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: cartparty-db
    region: ohio
    plan: free
    databaseName: cartparty
    user: cartparty

envVarGroups:
  - name: cartparty-secrets
    envVars:
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
